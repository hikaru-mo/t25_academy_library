<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <div class="mb30 flexarea">
                            <span>
                                <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                            </span>
                        </div>
                            <tr>
                                <th scope="col">*は必須です</th>
                                <br>
                            </tr>
                            <tr>
                                <th scope="col">書籍名</th>
                                <th scope="col">*</th>
                                <br>
                                <td>
                                    <div class="error_msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
                                    </div>
                                    <input type="text" name="title" placeholder="書籍名を入力" th:field="*{title}"/>
                                </td>
                            </tr>
                            <br>
                            <tr>
                                <th scope="col">ISBN</th>
                                <th scope="col">*</th>
                                <br>
                                <td>
                                    <div class="error_msg" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}">
                                    </div>
                                    <input type="text" name="isbn" placeholder="ISBNを入力" th:field="*{isbn}" />
                                </td>
                            </tr>
                            <div class="btn_block">
                                <input type="submit" value="保存">
                            </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
